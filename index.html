<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coupe du Monde 2026 — Simulateur</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Bebas+Neue&display=swap');

:root{
  --bg-deep: #0a0e14;
  --bg-panel: #131922;
  --bg-card: #1a2230;
  --bg-card-hover: #212b3d;
  --line: #2a3548;
  --line-soft: #1f2937;
  --text-hi: #f4f6f9;
  --text-mid: #aeb9cc;
  --text-low: #6b7689;
  --gold: #f2c14e;
  --gold-deep: #c99a2e;
  --green: #2fd180;
  --green-deep: #16a35c;
  --red: #ff5c5c;
  --red-deep: #d83a3a;
  --blue: #4d9fff;
  --pitch: #1e7d3c;
  --pitch-line: rgba(255,255,255,0.55);
  --radius-s: 8px;
  --radius-m: 14px;
  --radius-l: 22px;
  --shadow-card: 0 10px 30px rgba(0,0,0,0.35);
  --shadow-pop: 0 20px 60px rgba(0,0,0,0.55);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Outfit',sans-serif;
  background:
    radial-gradient(1200px 600px at 50% -10%, #16202f 0%, var(--bg-deep) 60%),
    var(--bg-deep);
  color:var(--text-hi);
  min-height:100vh;
  overflow-x:hidden;
}
.display{font-family:'Bebas Neue',sans-serif; letter-spacing:0.5px;}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

.app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:24px}
.screen{display:none;animation:fadeIn .35s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ---------- top bar ---------- */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:18px 20px 14px;
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg, var(--bg-deep) 60%, transparent);
}
.iconbtn{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg-card);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-hi);cursor:pointer;font-size:18px;
  transition:.15s;flex-shrink:0;
}
.iconbtn:hover{background:var(--bg-card-hover);border-color:var(--gold-deep)}
.iconbtn:active{transform:scale(0.92)}
.topbar h2{font-family:'Bebas Neue',sans-serif;font-size:24px;font-weight:400;letter-spacing:1px;flex:1}
.topbar .sub{font-size:11px;color:var(--text-low);margin-top:-2px}

.content{padding:0 20px}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border-radius:var(--radius-m);
  padding:14px 20px;font-size:15px;font-weight:600;
  border:1px solid var(--line);background:var(--bg-card);color:var(--text-hi);
  cursor:pointer;transition:.15s;width:100%;font-family:inherit;
}
.btn:hover{background:var(--bg-card-hover)}
.btn:active{transform:scale(0.985)}
.btn-gold{
  background:linear-gradient(135deg,#f2c14e,#d89a2e);
  border:none;color:#1a1304;font-weight:700;
  box-shadow:0 8px 24px rgba(242,193,78,0.25);
}
.btn-gold:hover{filter:brightness(1.06)}
.btn-green{background:linear-gradient(135deg,#2fd180,#16a35c);border:none;color:#04220f;font-weight:700;box-shadow:0 8px 24px rgba(47,209,128,0.22)}
.btn-red{background:linear-gradient(135deg,#ff5c5c,#d83a3a);border:none;color:#350707;font-weight:700}
.btn-ghost{background:transparent;border:1px solid var(--line)}
.btn-sm{padding:9px 14px;font-size:13px;width:auto}
.btn[disabled]{opacity:0.35;pointer-events:none}

/* ---------- cards ---------- */
.card{
  background:var(--bg-panel);
  border:1px solid var(--line-soft);
  border-radius:var(--radius-l);
  padding:18px;margin-bottom:14px;
  box-shadow:var(--shadow-card);
}
.card h3{font-size:14px;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}

/* ---------- home ---------- */
.hero{
  text-align:center;padding:50px 24px 30px;
  position:relative;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(242,193,78,0.12);border:1px solid rgba(242,193,78,0.3);
  color:var(--gold);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:6px 14px;border-radius:30px;margin-bottom:18px;
}
.hero .ball{font-size:52px;margin-bottom:10px;filter:drop-shadow(0 6px 16px rgba(0,0,0,0.4))}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:1px;line-height:1.05;
  background:linear-gradient(135deg,#fff,#aeb9cc);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p{color:var(--text-mid);margin-top:10px;font-size:14px}

.menu-tile{
  display:flex;align-items:center;gap:16px;
  background:var(--bg-panel);border:1px solid var(--line-soft);
  border-radius:var(--radius-l);padding:18px;margin-bottom:12px;
  cursor:pointer;transition:.18s;position:relative;overflow:hidden;
}
.menu-tile:hover{border-color:var(--gold-deep);background:var(--bg-card-hover)}
.menu-tile:active{transform:scale(0.985)}
.menu-tile.disabled{opacity:0.4;pointer-events:none}
.menu-tile .ico{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  background:linear-gradient(135deg, rgba(242,193,78,0.18), rgba(242,193,78,0.05));
}
.menu-tile .txt strong{display:block;font-size:16px;font-weight:600}
.menu-tile .txt span{font-size:12.5px;color:var(--text-low)}
.menu-tile .chev{margin-left:auto;color:var(--text-low);font-size:20px}

/* ---------- forms ---------- */
.field{margin-bottom:18px}
.field label{display:block;font-size:12.5px;color:var(--text-mid);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.stepper{display:flex;align-items:center;gap:14px;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius-m);padding:6px}
.stepper button{
  width:38px;height:38px;border-radius:10px;border:none;background:var(--bg-card-hover);
  color:var(--text-hi);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.stepper button:hover{background:var(--gold-deep);color:#1a1304}
.stepper button:active{transform:scale(0.9)}
.stepper .val{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px}
.stepper .unit{font-size:12px;color:var(--text-low);padding-right:10px}

.search-box{position:relative;margin-bottom:14px}
.search-box input{
  width:100%;padding:13px 16px 13px 42px;border-radius:var(--radius-m);
  background:var(--bg-card);border:1px solid var(--line);color:var(--text-hi);font-size:14px;font-family:inherit;
}
.search-box input:focus{outline:none;border-color:var(--gold-deep)}
.search-box .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-low)}

.country-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-height:380px;overflow-y:auto;padding-right:2px}
.country-btn{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:var(--radius-m);
  background:var(--bg-card);border:1px solid var(--line);
  cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text-hi);
  transition:.15s;text-align:left;
}
.country-btn .flag{font-size:22px}
.country-btn:hover{border-color:var(--gold-deep)}
.country-btn.selected{border-color:var(--gold);background:rgba(242,193,78,0.12);box-shadow:0 0 0 1px var(--gold) inset}

/* ---------- badges ---------- */
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:30px;letter-spacing:0.3px;text-transform:uppercase}
.badge-gold{background:rgba(242,193,78,0.15);color:var(--gold)}
.badge-green{background:rgba(47,209,128,0.15);color:var(--green)}
.badge-red{background:rgba(255,92,92,0.15);color:var(--red)}
.badge-blue{background:rgba(77,159,255,0.15);color:var(--blue)}
.badge-gray{background:var(--bg-card);color:var(--text-mid);border:1px solid var(--line)}

/* ---------- group table ---------- */
.gtable{width:100%;border-collapse:collapse}
.gtable th{text-align:left;font-size:10.5px;color:var(--text-low);text-transform:uppercase;letter-spacing:0.4px;padding:6px 8px;font-weight:600}
.gtable td{padding:9px 8px;font-size:13px;border-top:1px solid var(--line-soft)}
.gtable tr.qualified{background:rgba(47,209,128,0.05)}
.gtable tr.qualified td:first-child{border-left:2px solid var(--green);padding-left:10px}
.gtable tr.you td:first-child{font-weight:700;color:var(--gold)}

/* ---------- stat bars ---------- */
.stat-line{margin-bottom:11px}
.stat-line .lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text-mid);margin-bottom:4px}
.stat-line .lbl b{color:var(--text-hi);font-weight:600}
.bar-track{height:6px;background:var(--bg-card);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),#7cc0ff)}

.vs-compare-row{margin-bottom:12px}
.vs-compare-row .nums{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.vs-compare-row .nums .l{color:var(--text-mid)}
.vs-compare-row .nums b{color:var(--text-hi)}
.vs-bar{display:flex;height:6px;border-radius:4px;overflow:hidden;background:var(--bg-card)}
.vs-bar .h{background:linear-gradient(90deg,#7cc0ff,var(--blue))}
.vs-bar .a{background:linear-gradient(90deg,var(--gold-deep),var(--gold))}
.vs-bar .gap{width:3px;background:var(--bg-deep)}

/* ---------- prematch ---------- */
.face-off{display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 0 8px}
.face-off .side{flex:1;text-align:center}
.face-off .flag-big{font-size:46px;margin-bottom:8px}
.face-off .name{font-size:15px;font-weight:700}
.face-off .vs-mid{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:1px}

/* ---------- zones ---------- */
.zonebar{display:flex;gap:4px;margin-top:6px}
.zone-cell{flex:1;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--text-low);background:var(--bg-card);border:1px solid var(--line)}
.zone-cell.on{color:#04220f;border:none}

/* ---------- info row ---------- */
.info-row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text-mid);padding:8px 0}
.info-row i{color:var(--gold);width:18px;text-align:center}

/* ---------- STADIUM / MATCH FULLSCREEN ---------- */
.stadium{
  position:fixed;inset:0;z-index:1000;
  background:#04140a;
  display:none;flex-direction:column;
  overflow:hidden;
}
.stadium.active{display:flex}
.stadium-scroll{flex:1;overflow-y:auto;min-height:0}
.stadium-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:#06190d;border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;position:sticky;top:0;z-index:5;
}
.stadium-top .exitbtn{
  width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);
  border:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;
}
.stadium-top .phase-lbl{font-size:10px;color:#8fae9c;text-transform:uppercase;letter-spacing:1px;font-weight:600}

.scoreboard{
  display:flex;align-items:center;justify-content:center;gap:0;
  padding:10px 12px 8px;background:#06190d;flex-shrink:0;
}
.sb-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.sb-team .flag{font-size:20px}
.sb-team .nm{font-size:10.5px;font-weight:700;color:#e8f3ec;text-align:center;letter-spacing:0.2px}
.sb-mid{padding:0 14px;text-align:center}
.sb-score{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1.5px;color:#fff;line-height:1}
.sb-clock{
  font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--gold);letter-spacing:1px;margin-top:1px;
  display:flex;align-items:center;gap:5px;justify-content:center;
}
.sb-clock .dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}

.pitch-wrap{
  position:relative;display:flex;align-items:center;justify-content:center;
  padding:8px 14px;flex-shrink:0;
}
.pitch{
  position:relative;width:100%;max-width:380px;aspect-ratio:16/9;
  background:
    repeating-linear-gradient(90deg, #1e8a42 0, #1e8a42 32px, #1c7f3d 32px, #1c7f3d 64px);
  border-radius:10px;overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.45), inset 0 0 0 2px rgba(255,255,255,0.85);
}
.pitch svg{position:absolute;inset:0;width:100%;height:100%}
.pitch-zone-overlay{position:absolute;inset:0;display:flex;pointer-events:none}
.pz{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px}
.pz span{font-size:8px;font-weight:700;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.4px;background:rgba(0,0,0,0.25);padding:1px 5px;border-radius:3px}
.pz.locked{background:rgba(0,0,0,0.38)}
.pz.locked span{color:rgba(255,255,255,0.85)}

.controls-area{flex-shrink:0;padding:10px 14px 16px;background:#06190d;border-top:1px solid rgba(255,255,255,0.06);position:sticky;bottom:0;z-index:5}
.goal-buttons{display:flex;gap:8px;margin-bottom:8px}
.goal-btn{
  flex:1;padding:10px 6px;border-radius:10px;border:none;cursor:pointer;
  font-size:11.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:.12s;color:#04220f;
}
.goal-btn .gico{font-size:15px}
.goal-btn.home{background:linear-gradient(135deg,#7cc0ff,#4d9fff);color:#04203f}
.goal-btn.away{background:linear-gradient(135deg,#f2c14e,#d89a2e);color:#1a1304}
.goal-btn:active{transform:scale(0.95)}
.stadium-actions{display:flex;gap:6px}
.stadium-actions .btn{padding:8px 8px;font-size:11px}

.lineup-toggle{
  display:flex;align-items:center;justify-content:center;gap:5px;
  font-size:10.5px;color:#8fae9c;padding:4px 0;cursor:pointer;font-weight:600;
}

/* ---------- live stats panel ---------- */
.live-stats-section{padding:0 14px 4px}
.live-stats-title{font-size:9.5px;color:#7c9788;text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:6px;text-align:center}
.live-stat-row{margin-bottom:6px}
.live-stat-row .nums{display:flex;justify-content:space-between;font-size:10.5px;margin-bottom:2px}
.live-stat-row .nums .l{color:#7c9788}
.live-stat-row .nums b{color:#e8f3ec;font-size:11px}
.live-stat-row .nums b.dropped{color:var(--red)}
.live-bar{display:flex;height:4px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.06)}
.live-bar .h{background:linear-gradient(90deg,#7cc0ff,var(--blue))}
.live-bar .a{background:linear-gradient(90deg,var(--gold-deep),var(--gold))}
.live-bar .gapx{width:2px;background:#06190d}

/* whistle flash */

.whistle-flash{
  position:fixed;inset:0;z-index:1100;background:rgba(255,255,255,0.85);
  display:none;align-items:center;justify-content:center;pointer-events:none;
}
.whistle-flash.show{display:flex;animation:flashOut .5s ease forwards}
@keyframes flashOut{0%{opacity:1}100%{opacity:0}}
.whistle-flash .wtxt{font-family:'Bebas Neue',sans-serif;font-size:34px;color:#0a0e14;letter-spacing:2px}

.goal-flash{
  position:fixed;inset:0;z-index:1100;display:none;align-items:center;justify-content:center;pointer-events:none;
}
.goal-flash.show{display:flex;animation:goalPop .9s ease forwards}
@keyframes goalPop{
  0%{opacity:0;transform:scale(0.6)}
  15%{opacity:1;transform:scale(1.08)}
  25%{transform:scale(1)}
  80%{opacity:1}
  100%{opacity:0}
}
.goal-flash .gtxt{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--gold);letter-spacing:3px;text-shadow:0 0 30px rgba(242,193,78,0.6), 0 4px 12px rgba(0,0,0,0.6)}

/* ---------- lineup ---------- */
.lineup-panel{
  background:#06190d;flex-shrink:0;display:none;
}
.lineup-panel.open{display:block}
.lineup-inner{padding:8px 14px 14px}
.lineup-team-switch{display:flex;gap:6px;margin-bottom:8px}
.lineup-team-switch button{
  flex:1;padding:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:#8fae9c;font-size:10.5px;font-weight:600;cursor:pointer;font-family:inherit;
}
.lineup-team-switch button.active{background:rgba(242,193,78,0.15);border-color:var(--gold);color:var(--gold)}
.player-row{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;
  background:rgba(255,255,255,0.03);margin-bottom:6px;
}
.player-row .num{
  width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#cfe8da;flex-shrink:0;
}
.player-row .pname{flex:1;font-size:12.5px;color:#e8f3ec;font-weight:500}
.player-row .ppos{font-size:9.5px;color:#7c9788;text-transform:uppercase;margin-right:4px}
.card-btn{
  width:20px;height:26px;border-radius:3px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);
  background:transparent;opacity:0.35;transition:.15s;flex-shrink:0;
}
.card-btn.yellow{background:#f2c14e}
.card-btn.red{background:#ff5c5c}
.card-btn.active{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,0.3)}
.player-row.sent-off{opacity:0.4}
.player-row.sent-off .pname{text-decoration:line-through}

.lineup-hint{display:flex;align-items:center;gap:4px;justify-content:center;font-size:9.5px;color:#7c9788;padding-top:6px}
.mini-pitch{
  position:relative;width:100%;max-width:340px;margin:0 auto;aspect-ratio:16/10;border-radius:10px;overflow:hidden;
  background:repeating-linear-gradient(90deg,#1e8a42 0,#1e8a42 26px,#1c7f3d 26px,#1c7f3d 52px);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,0.75);
}
.mini-pitch-lines{position:absolute;inset:0}
.mini-pitch-lines svg{width:100%;height:100%}
.pdot{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:none;border:none;cursor:pointer;padding:1px;z-index:2;
}
.pdot-circle{
  width:18px;height:18px;border-radius:50%;background:rgba(8,20,12,0.78);
  border:1.2px solid rgba(255,255,255,0.85);color:#fff;font-size:8px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  background-size:cover;background-position:center top;
  overflow:hidden;
}
.pdot-circle.has-photo{background-color:#0a1410}
.pdot-num-fallback{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.pdot-label{
  font-size:7px;color:#fff;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,0.8);
  white-space:nowrap;max-width:44px;overflow:hidden;text-overflow:ellipsis;
}
.pdot.is-yellow .pdot-circle{border-color:var(--gold);box-shadow:0 0 0 2px rgba(242,193,78,0.35)}
.pdot.is-red .pdot-circle{border-color:var(--red);box-shadow:0 0 0 2px rgba(255,92,92,0.35)}
.pdot.off{opacity:0.45}
.pdot-card{position:absolute;top:-2px;right:-2px;width:6px;height:9px;border-radius:1.5px;border:1px solid rgba(255,255,255,0.6)}
.pdot-card.yellow{background:var(--gold)}
.pdot-card.red{background:var(--red)}

.subs-counter-bar{
  display:flex;align-items:center;gap:5px;justify-content:center;
  font-size:10.5px;color:#8fae9c;padding:4px 0 8px;
}
.subs-counter-bar b{color:#e8f3ec}
.subs-counter{font-size:9.5px;color:#7c9788;display:block;margin-top:2px}

.pdot.is-sub .pdot-circle{box-shadow:0 0 0 2px rgba(77,159,255,0.45)}
.pdot.is-offpos .pdot-circle{box-shadow:0 0 0 2px rgba(255,92,92,0.5)}
.pdot-sub-badge{
  position:absolute;bottom:-2px;right:-3px;width:10px;height:10px;border-radius:50%;
  background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:6px;color:#04203f;
  border:1px solid rgba(255,255,255,0.5);
}
.pdot-sub-badge.warn{background:var(--red);color:#350707}
.sub-history{padding:8px 2px 0;display:flex;flex-direction:column;gap:3px}
.sub-history-row{font-size:10px;color:#9fc2ad;display:flex;align-items:center;gap:5px}
.sub-history-row.warn{color:#ffb4b4}
.sub-history-row .arrow{color:#5a7d68}
.offpos-tag{font-size:8.5px;color:var(--red);background:rgba(255,92,92,0.15);padding:1px 5px;border-radius:8px;font-weight:700;text-transform:uppercase}
.sub-section-lbl{font-size:9.5px;color:#e0a23e;text-transform:uppercase;letter-spacing:0.4px;padding:8px 2px 2px;font-weight:600;display:flex;align-items:center;gap:4px}
.badge-sub-in{font-size:9px;color:var(--blue);background:rgba(77,159,255,0.12);padding:2px 6px;border-radius:10px;font-weight:700;text-transform:uppercase;margin-left:4px;vertical-align:middle}

.card-pop-btn.sub{color:var(--blue);border-color:rgba(77,159,255,0.3);background:rgba(77,159,255,0.07)}
.card-pop-btn.sub-option.off-position{border-color:rgba(255,92,92,0.25);background:rgba(255,92,92,0.05)}
.sub-pos-badge.warn{background:rgba(255,92,92,0.18);color:var(--red)}
.sub-tag.warn{color:var(--red)}
.sub-list{max-height:280px;overflow-y:auto}
.card-pop-btn.sub-option{justify-content:flex-start}
.sub-pos-badge{
  width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#cfe8da;flex-shrink:0;
}
.sub-info{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.sub-name{font-size:13px;font-weight:600;color:#fff}
.sub-tag{font-size:10px;color:#7c9788}
.sub-delta{font-size:13px;font-weight:700;color:#7c9788;flex-shrink:0}
.sub-delta.pos{color:var(--green)}
.sub-delta.neg{color:var(--red)}
.sub-empty{font-size:12px;color:#7c9788;text-align:center;padding:16px 0}

.card-pop-backdrop{
  position:fixed;inset:0;z-index:1200;background:rgba(0,0,0,0.55);
  display:flex;align-items:flex-end;justify-content:center;
}
.card-pop{
  width:100%;max-width:420px;background:#101a13;border-radius:16px 16px 0 0;
  padding:16px 16px 22px;animation:popUp .22s ease;
}
@keyframes popUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.card-pop-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.card-pop-header-text{flex:1;min-width:0}
.card-pop-header-text .card-pop-sub{margin-bottom:0}
.pop-photo{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  background-size:cover;background-position:center top;overflow:hidden;
}
.pop-photo.has-photo{background-color:#0a1410;border-color:rgba(255,255,255,0.3)}
.pop-photo-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#cfe8da;letter-spacing:0.5px}
.card-pop-title{font-size:14px;font-weight:700;color:#fff}
.card-pop-sub{font-size:11px;color:#8fae9c;margin-bottom:12px}
.card-pop-actions{display:flex;flex-direction:column;gap:7px}
.card-pop-btn{
  display:flex;align-items:center;gap:9px;width:100%;padding:11px 13px;border-radius:11px;
  border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#fff;
  font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;
}
.card-pop-btn.clear{color:#8fae9c}
.mini-card{display:inline-block;width:12px;height:16px;border-radius:2px}
.mini-card.yellow{background:var(--gold)}
.mini-card.red{background:var(--red)}

/* ---------- result screens ---------- */
.result-banner{text-align:center;padding:36px 20px;border-radius:var(--radius-l);margin-bottom:16px}
.result-banner.win{background:linear-gradient(160deg, rgba(47,209,128,0.18), rgba(47,209,128,0.04));border:1px solid rgba(47,209,128,0.3)}
.result-banner.lose{background:linear-gradient(160deg, rgba(255,92,92,0.18), rgba(255,92,92,0.04));border:1px solid rgba(255,92,92,0.3)}
.result-banner.draw{background:var(--bg-panel);border:1px solid var(--line-soft)}
.result-banner .ic{font-size:38px;margin-bottom:8px}
.result-banner .lbl{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px}
.result-banner.win .lbl{color:var(--green)}
.result-banner.lose .lbl{color:var(--red)}
.scoreline{text-align:center;padding:14px}
.scoreline .sc{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px}
.scoreline .tn{color:var(--text-mid);font-size:13px;margin-top:4px}

.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.metric-box{background:var(--bg-card);border-radius:var(--radius-m);padding:12px;text-align:center}
.metric-box .v{font-family:'Bebas Neue',sans-serif;font-size:22px}
.metric-box .l{font-size:10.5px;color:var(--text-low);text-transform:uppercase;margin-top:2px}

.result-item{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;font-size:13px;border-top:1px solid var(--line-soft)}
.result-item:first-child{border-top:none}
.result-item.you{background:rgba(242,193,78,0.06);border-radius:8px;padding:9px 10px}

hr.sep{border:none;border-top:1px solid var(--line-soft);margin:16px 0}
.center-note{text-align:center;font-size:12px;color:var(--text-low);margin-top:8px}
</style>

function generateBenchFor(team, seed){
  let s = seed+777;
  const rand = ()=>{ s = (s*9301+49297)%233280; return s/233280; };
  const postesNeeded = ["G","G","D","D","D","M","M","A","A","A"];
  const bench = [];
  postesNeeded.forEach((pos,i)=>{
    const fn = FIRST_NAMES[Math.floor(rand()*FIRST_NAMES.length)];
    const ln = LAST_NAMES[Math.floor(rand()*LAST_NAMES.length)];
    const delta = Math.round((rand()*3-1.5)*10)/10; // entre -1.5 et +1.5
    bench.push([`${ln}`, pos, delta]);
  });
  return bench;
}

function getBenchFor(team, seed){
  const real = BENCH[team.name];
  if(real) return real;
  return generateBenchFor(team, seed);
}

function genLineup(team, seed){

    return real.map((pl,i)=>{

      return {

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// Impact des cartons par poste touche specifiquement les stats liees a ce poste.
// jaune = -1 sur les stats du poste concerne (le joueur est sur ses gardes, prend moins de risques)
// rouge = -1 supplementaire sur ces memes stats + malus global d'equipe (un joueur en moins sur le terrain)
const CARD_STAT_MAP = {
  G: ['gardien','arret'],
  D: ['arret','vitesse'],
  M: ['dribble','vitesse'],
  A: ['tir','dribble'],
};
const YELLOW_PENALTY = 1;
const RED_EXTRA_PENALTY = 1;
const RED_TEAM_PENALTY = 0.6; // malus global supplementaire par rouge (joueur en moins sur le terrain)
const OFF_POSITION_PENALTY = 3; // un joueur depannant hors de son poste fait chuter lourdement les stats du poste occupe

function effectiveStats(team, lineup){
  const stats = {
    rating: team.rating,
    dribble: team.dribble,
    arret: team.arret,
    tir: team.tir,
    gardien: team.gardien,
    vitesse: team.vitesse,
  };
  if(!lineup) return stats;

  let redCount = 0;
  let keeperSentOff = false;
  let keeperOutOfPosition = false;
  lineup.forEach(p=>{
    const slotPos = p.playedPos || p.pos; // poste occupe sur le terrain (slot)
    const keys = CARD_STAT_MAP[slotPos] || ['dribble'];
    if(p.yellow>0){
      keys.forEach(k=>{ stats[k] -= YELLOW_PENALTY * p.yellow; });
    }
    if(p.red){
      redCount++;
      if(slotPos==='G') keeperSentOff = true;
      keys.forEach(k=>{ stats[k] -= RED_EXTRA_PENALTY; });
    }
    if(p.statDelta){
      // le delta tactique du joueur s'applique sur les stats de son poste reel
      const realKeys = CARD_STAT_MAP[p.pos] || ['dribble'];
      realKeys.forEach(k=>{ stats[k] += p.statDelta; });
    }
    if(p.offPosition){
      // joueur depannant hors de son poste habituel : grosse penalite sur les stats du poste occupe
      if(slotPos==='G') keeperOutOfPosition = true;
      else keys.forEach(k=>{ stats[k] -= OFF_POSITION_PENALTY; });
    }
  });
  if(redCount>0){
    const teamFactor = redCount * RED_TEAM_PENALTY;
    Object.keys(stats).forEach(k=>{ stats[k] -= teamFactor; });
  }
  // gardien exclu OU joueur hors-poste dans les buts = plus de vrai gardien :
  // le niveau gardien s'effondre presque a zero.
  if(keeperSentOff || keeperOutOfPosition){
    stats.gardien = 0.5;
  }
  Object.keys(stats).forEach(k=>{ stats[k] = Math.max(0.5, Math.min(10, stats[k])); });
  return stats;
}


function simulateMatch(homeTeam, awayTeam, homeLineup, awayLineup){
  const h = effectiveStats(homeTeam, homeLineup);
  const a = effectiveStats(awayTeam, awayLineup);
  const hStr=(h.rating+h.tir+h.dribble+h.vitesse)/4;
  const aStr=(a.rating+a.tir+a.dribble+a.vitesse)/4;
  const hDef=(h.arret+h.gardien)/2;
  const aDef=(a.arret+a.gardien)/2;
  const hExpect=Math.max(0.3,(hStr/(hStr+aDef))*state.maxGoals*0.7+Math.random()*0.8);
  const aExpect=Math.max(0.3,(aStr/(aStr+hDef))*state.maxGoals*0.7+Math.random()*0.8);
  return [Math.min(state.maxGoals,Math.round(hExpect)),Math.min(state.maxGoals,Math.round(aExpect))];
}

function updateGroupStanding(groupLetter,homeTeam,awayTeam,hg,ag){
  const s=state.groupStandings[groupLetter];
  const h=s.find(x=>x.team.name===homeTeam.name);
  const a=s.find(x=>x.team.name===awayTeam.name);
  if(!h||!a)return;
  h.gf+=hg;h.ga+=ag;h.gd+=hg-ag;h.played++;
  a.gf+=ag;a.ga+=hg;a.gd+=ag-hg;a.played++;
  if(hg>ag){h.pts+=3;}else if(hg===ag){h.pts+=1;a.pts+=1;}else{a.pts+=3;}
}

function sortStanding(st){
  return [...st].sort((a,b)=>(b.pts-a.pts)||(b.gd-a.gd)||(b.gf-a.gf));
}

function getGroupMatchday(teams,matchday){
  const fixtures=[[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]];
  return fixtures[matchday-1].map(p=>[teams[p[0]],teams[p[1]]]);
}

function simulateOtherGroupMatches(matchday){
  state.groups.forEach(g=>{
    if(g.letter===state.playerGroup.letter) return;
    const matches=getGroupMatchday(g.teams,matchday);
    matches.forEach(m=>{
      const r=simulateMatch(m[0],m[1]);
      updateGroupStanding(g.letter,m[0],m[1],r[0],r[1]);
      state.allGroupResults[g.letter].push({home:m[0],away:m[1],hg:r[0],ag:r[1],matchday});
    });
  });
  const pg=state.playerGroup;
  const nonPlayer=getGroupMatchday(pg.teams,matchday).filter(m=>
    m[0].name!==state.playerTeam.name&&m[1].name!==state.playerTeam.name
  );
  nonPlayer.forEach(m=>{
    const r=simulateMatch(m[0],m[1]);
    updateGroupStanding(pg.letter,m[0],m[1],r[0],r[1]);
    state.allGroupResults[pg.letter].push({home:m[0],away:m[1],hg:r[0],ag:r[1],matchday});
  });
}

function getGroupQualifiers(){
  const qualified=[];
  state.groups.forEach(g=>{
    const sorted=sortStanding(state.groupStandings[g.letter]);
    qualified.push({group:g.letter,pos:1,team:sorted[0].team});
    qualified.push({group:g.letter,pos:2,team:sorted[1].team});
  });
  return qualified;
}

function startTournament(){
  if(!state.playerTeam){ flashMsg('Choisis ton équipe !'); return; }
  const shuffled=shuffle(TEAMS);
  const playerIdx=shuffled.findIndex(t=>t.name===state.playerTeam.name);
  if(playerIdx>=0) shuffled.splice(playerIdx,1);
  shuffled.unshift(state.playerTeam);

  state.groups=[];
  const groupLetters='ABCDEFGHIJKL'.split('');
  for(let i=0;i<12;i++){
    state.groups.push({ letter:groupLetters[i], teams: shuffled.slice(i*4,(i+1)*4) });
  }
  state.playerGroup = state.groups.find(g=>g.teams.some(t=>t.name===state.playerTeam.name));

  state.groupStandings={};
  state.allGroupResults={};
  state.groups.forEach(g=>{
    state.groupStandings[g.letter]=g.teams.map(t=>({team:t,pts:0,gf:0,ga:0,gd:0,played:0}));
    state.allGroupResults[g.letter]=[];
  });

  const pg=state.playerGroup;
  const others=pg.teams.filter(t=>t.name!==state.playerTeam.name);
  state.playerMatches=[
    {home:state.playerTeam,away:others[0],matchday:1,played:false},
    {home:others[1],away:state.playerTeam,matchday:2,played:false},
    {home:state.playerTeam,away:others[2],matchday:3,played:false},
  ];
  state.currentMatchIndex=0;
  state.phase='groups';

  simulateOtherGroupMatches(1);
  goTo('s-groups');
}

function setupKnockout(){
  state.phase='knockout';
  const qualifiers=getGroupQualifiers();
  const pairings=[
    ['A',1,'B',2],['C',1,'D',2],['E',1,'F',2],['G',1,'H',2],
    ['I',1,'J',2],['K',1,'L',2],
    ['A',2,'B',1],['C',2,'D',1],['E',2,'F',1],['G',2,'H',1],
    ['I',2,'J',1],['K',2,'L',1],
  ];
  state.knockoutBracket=pairings.map(([g1,p1,g2,p2])=>{
    const t1=qualifiers.find(q=>q.group===g1&&q.pos===p1)?.team;
    const t2=qualifiers.find(q=>q.group===g2&&q.pos===p2)?.team;
    return{home:t1||TEAMS[0],away:t2||TEAMS[1],played:false,round:'R32'};
  });
  state.knockoutRound='R32';
}

function simulateOtherKnockoutMatches(){
  state.knockoutBracket.forEach(m=>{
    if(m.played)return;
    if(m.home.name===state.playerTeam.name||m.away.name===state.playerTeam.name)return;
    const r=simulateMatch(m.home,m.away);
    let hg=r[0],ag=r[1];
    if(hg===ag){hg+=1;}
    m.played=true;m.hg=hg;m.ag=ag;
    m.winner=hg>ag?m.home:m.away;
  });
}

function advanceKnockoutRound(){
  const winners=state.knockoutBracket.map(m=>{
    if(!m.winner)m.winner=m.hg>m.ag?m.home:m.away;
    return m.winner;
  });
  const nextRound={'R32':'R16','R16':'SF','SF':'F'};
  state.knockoutRound=nextRound[state.knockoutRound];
  const nextBracket=[];
  for(let i=0;i<winners.length;i+=2){
    nextBracket.push({home:winners[i],away:winners[i+1]||winners[i],played:false,round:state.knockoutRound});
  }
  state.knockoutBracket=nextBracket;
}

const playerPhotoCache = {}; // nom -> url | null (null = recherche faite, rien trouvé)

function playerPhotoQuery(playerName, teamName){
  // ameliore la recherche en ajoutant le pays + "footballeur" pour lever les ambiguites de nom
  return `${playerName} ${teamName} footballeur`;
}

async function fetchPlayerPhoto(playerName, teamName){
  const cacheKey = `${teamName}::${playerName}`;
  if(cacheKey in playerPhotoCache) return playerPhotoCache[cacheKey];
  try{
    const q = encodeURIComponent(playerPhotoQuery(playerName, teamName));
    const url = `https://fr.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${q}&gsrlimit=1&prop=pageimages&piprop=thumbnail&pithumbsize=200&format=json&origin=*`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('http error');
    const data = await res.json();
    const pages = data && data.query && data.query.pages;
    if(!pages) { playerPhotoCache[cacheKey] = null; return null; }
    const first = Object.values(pages)[0];
    const thumb = first && first.thumbnail && first.thumbnail.source;
    playerPhotoCache[cacheKey] = thumb || null;
    return thumb || null;
  }catch(e){
    playerPhotoCache[cacheKey] = null;
    return null;
  }
}

function playerPhotoElementId(side, idx){
  return `pphoto-${side}-${idx}`;
}

// lance la recherche de photo en arriere-plan et met a jour le DOM si trouvee, sans bloquer le rendu
function lazyLoadPlayerPhoto(side, idx, playerName, teamName){
  const elId = playerPhotoElementId(side, idx);
  fetchPlayerPhoto(playerName, teamName).then(url=>{
    if(!url) return;
    const el = document.getElementById(elId);
    if(!el) return; // le joueur a peut-etre change depuis (changement, re-render)
    const img = new Image();
    img.onload = ()=>{
      el.style.backgroundImage = `url('${url}')`;
      el.classList.add('has-photo');
      const numSpan = el.querySelector('.pdot-num-fallback');
      if(numSpan) numSpan.style.display = 'none';
    };
    img.onerror = ()=>{ /* echec chargement reel -> on garde le numero affiche */ };
    img.src = url;
  });
}

function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playWhistle(kind){
  // kind: 'start' (un coup bref), 'end' (trois coups), 'goal' (sifflet court + montant)
  const ctx = ensureAudio();
  const now = ctx.currentTime;

  function blast(t0, dur, freq){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const noise = ctx.createOscillator();
    osc.type='square';
    osc.frequency.setValueAtTime(freq, t0);
    noise.type='sawtooth';
    noise.frequency.setValueAtTime(freq*1.5, t0);
    gain.gain.setValueAtTime(0,t0);
    gain.gain.linearRampToValueAtTime(0.18,t0+0.015);
    gain.gain.setValueAtTime(0.18,t0+dur-0.04);
    gain.gain.linearRampToValueAtTime(0,t0+dur);
    osc.connect(gain); noise.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+dur);
    noise.start(t0); noise.stop(t0+dur);
  }

  if(kind==='start'){
    blast(now, 0.35, 2200);
  } else if(kind==='end'){
    blast(now, 0.22, 2200);
    blast(now+0.3, 0.22, 2200);
    blast(now+0.6, 0.45, 2200);
  } else if(kind==='goal'){
    blast(now, 0.15, 2400);
  } else if(kind==='card'){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(700, now);
    osc.frequency.exponentialRampToValueAtTime(300, now+0.18);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now+0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now+0.22);
  }
}

function flashWhistle(){
  const el = document.getElementById('whistleFlash');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  playWhistle('start');
}
function flashGoalFx(){
  const el = document.getElementById('goalFlash');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  playWhistle('goal');
}

function flashMsg(msg){
  // petit toast simple
  let t = document.getElementById('toastMsg');
  if(!t){
    t = document.createElement('div');
    t.id='toastMsg';
    t.style.cssText='position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#1a2230;color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,0.4);border:1px solid #2a3548;transition:opacity .3s';

}

function fmtClock(totalSeconds){
  const m = Math.floor(totalSeconds/60);
  const s = Math.floor(totalSeconds%60);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function openStadium(match, isKnockout){
  matchState = {
    match,
    isKnockout: !!isKnockout,
    homeScore: 0,
    awayScore: 0,
    elapsed: 0,
    totalSeconds: state.matchDuration*60,
    running: false,
    timerHandle: null,
    homeLineup: genLineup(match.home, match.home.name.length*7+1),
    awayLineup: genLineup(match.away, match.away.name.length*13+3),
    homeBench: getBenchFor(match.home, match.home.name.length*7+1).map(b=>({name:b[0],pos:b[1],delta:b[2],used:false})),
    awayBench: getBenchFor(match.away, match.away.name.length*13+3).map(b=>({name:b[0],pos:b[1],delta:b[2],used:false})),
    homeSubsUsed: 0,
    awaySubsUsed: 0,
    lineupOpen:true,
    lineupTeam:'home',
    finished:false,
  };
  renderStadium();
  document.getElementById('stadium').classList.add('active');
  document.body.style.overflow='hidden';
  setTimeout(()=>{ flashWhistle(); startTimer(); }, 350);
}

function closeStadium(){
  stopTimer();
  document.getElementById('stadium').classList.remove('active');
  document.body.style.overflow='';
}

function startTimer(){
  if(matchState.running) return;
  matchState.running = true;
  matchState.timerHandle = setInterval(()=>{
    matchState.elapsed += 1;
    if(matchState.elapsed >= matchState.totalSeconds){
      matchState.elapsed = matchState.totalSeconds;
      finishMatchInStadium();
    }
    updateClockOnly();
  }, 1000);
}
function stopTimer(){
  matchState.running = false;
  if(matchState.timerHandle) clearInterval(matchState.timerHandle);
}

function updateClockOnly(){
  const el = document.getElementById('sbClockTxt');
  if(el) el.textContent = fmtClock(matchState.totalSeconds - matchState.elapsed);
}

function addGoal(side){
  if(matchState.finished) return;
  if(side==='home') matchState.homeScore++; else matchState.awayScore++;
  flashGoalFx();
  if(navigator.vibrate) navigator.vibrate(60);
  renderStadium();
  if(matchState.homeScore>=state.maxGoals || matchState.awayScore>=state.maxGoals){
    setTimeout(()=>finishMatchInStadium(),700);
  }
}
function removeGoal(side){
  if(matchState.finished) return;
  if(side==='home') matchState.homeScore=Math.max(0,matchState.homeScore-1);
  else matchState.awayScore=Math.max(0,matchState.awayScore-1);
  renderStadium();
}

function finishMatchInStadium(){
  if(matchState.finished) return;
  matchState.finished = true;
  stopTimer();
  playWhistle('end');
  if(navigator.vibrate) navigator.vibrate([80,60,80,60,160]);
  setTimeout(()=>{
    closeStadium();
    if(matchState.isKnockout) resolveKnockoutResult(matchState.homeScore, matchState.awayScore);
    else resolveGroupResult(matchState.homeScore, matchState.awayScore);
  }, 900);
}

function toggleLineup(){
  matchState.lineupOpen = !matchState.lineupOpen;
  renderStadium();
}
function switchLineupTeam(t){
  matchState.lineupTeam = t;
  renderStadium();
}
function cycleCard(side, idx, type){
  const lineup = side==='home' ? matchState.homeLineup : matchState.awayLineup;
  const p = lineup[idx];
  playWhistle('card');
  if(type==='yellow'){
    if(p.red) return;
    p.yellow = p.yellow>=2 ? 0 : p.yellow+1;
    if(p.yellow>=2){ p.red = true; }
  } else if(type==='red'){
    p.red = !p.red;
    if(!p.red) p.yellow = Math.min(p.yellow,1);
  }
  renderStadium();
}

            <div class="pz ${m.home.zones>=2?'':'locked'}"><span>2</span></div>
            <div class="pz ${m.home.zones>=3?'':'locked'}"><span>3</span></div>
          </div>
        </div>
      </div>
      <div class="live-stats-section">
        <div class="live-stats-title">Stats en direct</div>
        ${renderLiveStats()}
      </div>
      <div class="lineup-toggle" onclick="toggleLineup()">
        <i class="ti ti-shirt-sport"></i> Compositions & cartons <i class="ti ti-chevron-${ms.lineupOpen?'up':'down'}"></i>
      </div>
      <div class="lineup-panel ${ms.lineupOpen?'open':''}">
        <div class="lineup-inner">
          <div class="lineup-team-switch">
            <button class="${ms.lineupTeam==='home'?'active':''}" onclick="switchLineupTeam('home')">${m.home.flag} ${m.home.name}</button>

        <button class="goal-btn away" onclick="addGoal('away')"><span class="gico">⚽</span>${m.away.name}</button>
      </div>
      <div class="stadium-actions">
        <button class="btn btn-ghost" onclick="removeGoal('home')"><i class="ti ti-minus"></i> ${m.home.name.slice(0,3)}</button>
        <button class="btn btn-ghost" onclick="removeGoal('away')"><i class="ti ti-minus"></i> ${m.away.name.slice(0,3)}</button>
        <button class="btn btn-gold" onclick="finishMatchInStadium()">Terminer</button>

function triggerLineupPhotoLoads(side){
  if(!matchState) return;
  const lineup = side==='home' ? matchState.homeLineup : matchState.awayLineup;
  const teamName = (side==='home' ? matchState.match.home : matchState.match.away).name;
  lineup.forEach((p, idx)=>{
    const cacheKey = `${teamName}::${p.name}`;
    if(cacheKey in playerPhotoCache) return; // deja en cache (trouve ou non), pas la peine de relancer
    lazyLoadPlayerPhoto(side, idx, p.name, teamName);
  });
}

function renderLiveStats(){
  const ms = matchState;
  const m = ms.match;
  const h = effectiveStats(m.home, ms.homeLineup);
  const a = effectiveStats(m.away, ms.awayLineup);
  const baseH = m.home, baseA = m.away;
  const rows = [
    {label:'Vitesse', k:'vitesse'},
    {label:'Puissance de tir', k:'tir'},
    {label:'Dribble', k:'dribble'},
    {label:'Défense / arrêts', k:'arret'},
    {label:'Niveau gardien', k:'gardien'},
  ];
  return rows.map(r=>{
    const hv = Math.round(h[r.k]*10)/10;
    const av = Math.round(a[r.k]*10)/10;
    const hDropped = hv < baseH[r.k];
    const aDropped = av < baseA[r.k];
    return `
      <div class="live-stat-row">
        <div class="nums">
          <span class="l"><b class="${hDropped?'dropped':''}">${hv}</b></span>
          <span class="l">${r.label}</span>
          <span class="l"><b class="${aDropped?'dropped':''}">${av}</b></span>
        </div>
        <div class="live-bar">
          <div class="h" style="flex:${Math.max(0.3,hv)}"></div>
          <div class="gapx"></div>
          <div class="a" style="flex:${Math.max(0.3,av)}"></div>
        </div>
      </div>
    `;
  }).join('');
}

function getZoneCellsHTML(team){
  return [1,2,3].map(z=>`<div class="zone-cell ${z<=team.zones?'on':''}">Z${z}</div>`).join('');
}

function renderLineupPitch(side){
  const lineup = side==='home' ? matchState.homeLineup : matchState.awayLineup;
  const teamName = (side==='home' ? matchState.match.home : matchState.match.away).name;
  // l'equipe away attaque vers la gauche visuellement -> on miroir les x
  const mirror = side==='away';
  const dots = lineup.map((p,idx)=>{
    const x = mirror ? (100-p.x) : p.x;
    const y = p.y;
    const cardClass = p.red ? 'is-red' : (p.yellow>0 ? 'is-yellow' : '');
    const photoId = playerPhotoElementId(side, idx);
    const cachedUrl = playerPhotoCache[`${teamName}::${p.name}`];
    const hasCachedPhoto = cachedUrl && cachedUrl!==null;
    return `
      <button class="pdot ${cardClass} ${p.subbedIn?'is-sub':''} ${p.offPosition?'is-offpos':''}" style="left:${x}%;top:${y}%" onclick="openCardPopover(event,'${side}',${idx})" aria-label="${p.first} ${p.name}">
        <span class="pdot-circle ${hasCachedPhoto?'has-photo':''}" id="${photoId}" style="${hasCachedPhoto?`background-image:url('${cachedUrl}')`:''}">
          <span class="pdot-num-fallback" style="${hasCachedPhoto?'display:none':''}">${p.num}</span>
        </span>
        <span class="pdot-label">${p.name}</span>
        ${p.offPosition?`<span class="pdot-sub-badge warn"><i class="ti ti-alert-triangle"></i></span>`:p.subbedIn?`<span class="pdot-sub-badge"><i class="ti ti-replace"></i></span>`:''}
        ${p.yellow>0?`<span class="pdot-card yellow"></span>`:''}
        ${p.red?`<span class="pdot-card red"></span>`:''}
      </button>`;
  }).join('');

  const histKey = side==='home' ? 'homeSubHistory' : 'awaySubHistory';
  const hist = matchState[histKey] || [];
  const histHTML = hist.length ? `
    <div class="sub-history">
      ${hist.map(h=>`<div class="sub-history-row ${h.offPosition?'warn':''}">${h.offPosition?'<i class="ti ti-alert-triangle"></i>':'<i class="ti ti-replace"></i>'} ${h.in} <span class="arrow">←</span> ${h.out}${h.offPosition?' <span class="offpos-tag">hors poste</span>':''}</div>`).join('')}
    </div>
  ` : '';

  return `
    <div class="mini-pitch">
      <div class="mini-pitch-lines">${buildPitchSVG()}</div>
      ${dots}
    </div>
    ${histHTML}
  `;
}

const POS_LABEL = {G:'Gardien', D:'Défenseur', M:'Milieu', A:'Attaquant'};

function popoverPhotoHTML(side, p, photoElId){
  const teamName = (side==='home' ? matchState.match.home : matchState.match.away).name;
  const cachedUrl = playerPhotoCache[`${teamName}::${p.name}`];
  const hasPhoto = cachedUrl && cachedUrl !== null;
  return `
    <span class="pop-photo ${hasPhoto?'has-photo':''}" id="${photoElId}" style="${hasPhoto?`background-image:url('${cachedUrl}')`:''}">
      <span class="pop-photo-num" style="${hasPhoto?'display:none':''}">${p.num}</span>
    </span>
  `;
}

function loadPopoverPhotoIfNeeded(side, p, photoElId){
  const teamName = (side==='home' ? matchState.match.home : matchState.match.away).name;
  const cacheKey = `${teamName}::${p.name}`;
  if(cacheKey in playerPhotoCache && playerPhotoCache[cacheKey]){
    return; // deja en cache et trouvee, rien a faire (deja affichee)
  }
  fetchPlayerPhoto(p.name, teamName).then(url=>{
    if(!url) return;
    const el = document.getElementById(photoElId);
    if(!el) return; // popover ferme entre temps
    const img = new Image();
    img.onload = ()=>{
      el.style.backgroundImage = `url('${url}')`;
      el.classList.add('has-photo');
      const numSpan = el.querySelector('.pop-photo-num');
      if(numSpan) numSpan.style.display = 'none';
    };
    img.src = url;
  });
}

function openCardPopover(ev, side, idx){

  const lineup = side==='home' ? matchState.homeLineup : matchState.awayLineup;
  const p = lineup[idx];
  const layer = document.getElementById('cardPopoverLayer');
  const photoElId = `pop-photo-${side}-${idx}`;

  const canSub = !p.red; // un joueur expulsé ne peut pas etre remplacé
  layer.innerHTML = `
    <div class="card-pop-backdrop" onclick="closeCardPopover()">
      <div class="card-pop" onclick="event.stopPropagation()">
        <div class="card-pop-header">
          ${popoverPhotoHTML(side, p, photoElId)}
          <div class="card-pop-header-text">
            <div class="card-pop-title">${p.num} · ${p.first} ${p.name}${p.subbedIn?' <span class="badge-sub-in">Entré en jeu</span>':''}</div>
            <div class="card-pop-sub">${POS_LABEL[p.pos]||p.pos}${p.red?' · Exclu':p.yellow>0?' · 1 avertissement':''}</div>
          </div>
        </div>
        <div class="card-pop-actions">
          <button class="card-pop-btn yellow" onclick="cycleCard('${side}',${idx},'yellow');closeCardPopover()">

            <span class="mini-card red"></span> ${p.red?'Annuler le rouge':'Carton rouge'}
          </button>
          ${(p.yellow>0||p.red) ? `<button class="card-pop-btn clear" onclick="clearCards('${side}',${idx});closeCardPopover()"><i class="ti ti-eraser"></i> Effacer les cartons</button>` : ''}
          ${canSub ? `<button class="card-pop-btn sub" onclick="openSubPopover('${side}',${idx})"><i class="ti ti-replace"></i> Faire un changement</button>` : ''}
        </div>
      </div>
    </div>
  `;
  loadPopoverPhotoIfNeeded(side, p, photoElId);
}

function openSubPopover(side, idx){
  const lineup = side==='home' ? matchState.homeLineup : matchState.awayLineup;
  const bench = side==='home' ? matchState.homeBench : matchState.awayBench;
  const usedKey = side==='home' ? 'homeSubsUsed' : 'awaySubsUsed';
  const subsUsed = matchState[usedKey] || 0;
  const out = lineup[idx];
  const layer = document.getElementById('cardPopoverLayer');

  if(subsUsed >= MAX_SUBS){
    layer.innerHTML = `
      <div class="card-pop-backdrop" onclick="closeCardPopover()">
        <div class="card-pop" onclick="event.stopPropagation()">
          <div class="card-pop-title">Changement impossible</div>
          <div class="card-pop-sub">Limite de ${MAX_SUBS} changements atteinte pour cette équipe (règle FIFA)</div>
          <button class="card-pop-btn clear" style="margin-top:8px" onclick="openCardPopoverFromIdx('${side}',${idx})"><i class="ti ti-arrow-left"></i> Retour</button>
        </div>
      </div>
    `;
    return;
  }

  // on ne propose que des remplacants du meme poste (changement realiste poste pour poste)
  const available = bench.map((b,bi)=>({...b, bi})).filter(b=>!b.used && b.pos===out.pos);
  const otherAvailable = bench.map((b,bi)=>({...b, bi})).filter(b=>!b.used && b.pos!==out.pos);

  function row(b, offPosition){
    const sign = b.delta>0 ? '+' : '';
    const tag = offPosition ? `Hors poste · ${POS_LABEL[b.pos]}` : (b.delta>=1 ? 'Option offensive' : b.delta<=-1 ? 'Option prudente' : 'Profil équilibré');
    return `
      <button class="card-pop-btn sub-option ${offPosition?'off-position':''}" onclick="makeSubstitution('${side}',${idx},${b.bi})">
        <span class="sub-pos-badge ${offPosition?'warn':''}">${b.pos}</span>
        <span class="sub-info"><span class="sub-name">${b.name}</span><span class="sub-tag ${offPosition?'warn':''}">${tag}</span></span>
        <span class="sub-delta ${b.delta>0?'pos':b.delta<0?'neg':''}">${sign}${b.delta}</span>
      </button>
    `;
  }

  const rows = available.length ? available.map(b=>row(b,false)).join('')
    : `<div class="sub-empty">Aucun remplaçant au poste ${POS_LABEL[out.pos]||out.pos} disponible</div>`;
  const otherRows = otherAvailable.length ? `
    <div class="sub-section-lbl"><i class="ti ti-alert-triangle"></i> Hors poste — fera chuter ${out.pos==='G'?'le niveau gardien':'des stats clés'}</div>
    ${otherAvailable.map(b=>row(b,true)).join('')}
  ` : '';

  const subPhotoElId = `pop-photo-sub-${side}-${idx}`;
  layer.innerHTML = `
    <div class="card-pop-backdrop" onclick="closeCardPopover()">
      <div class="card-pop" onclick="event.stopPropagation()">
        <div class="card-pop-header">
          ${popoverPhotoHTML(side, out, subPhotoElId)}
          <div class="card-pop-header-text">
            <div class="card-pop-title">Changement</div>
            <div class="card-pop-sub">${out.name} sort <span class="subs-counter">${subsUsed}/${MAX_SUBS} changements utilisés</span></div>
          </div>
        </div>
        <div class="card-pop-actions sub-list">
          ${rows}
          ${otherRows}
        </div>
        <button class="card-pop-btn clear" style="margin-top:8px" onclick="openCardPopoverFromIdx('${side}',${idx})"><i class="ti ti-arrow-left"></i> Retour</button>
      </div>
    </div>
  `;
  loadPopoverPhotoIfNeeded(side, out, subPhotoElId);
}

function openCardPopoverFromIdx(side, idx){
  openCardPopover({stopPropagation(){}}, side, idx);
}

function makeSubstitution(side, idx, benchIdx){
  const lineup = side==='home' ? matchState.homeLineup : matchState.awayLineup;
  const bench = side==='home' ? matchState.homeBench : matchState.awayBench;
  const usedKey = side==='home' ? 'homeSubsUsed' : 'awaySubsUsed';
  if((matchState[usedKey]||0) >= MAX_SUBS) return;

  const out = lineup[idx];
  const incoming = bench[benchIdx];
  if(!incoming || incoming.used) return;

  const offPosition = incoming.pos !== out.pos;

  incoming.used = true;
  matchState[usedKey] = (matchState[usedKey]||0) + 1;
  // le remplacant prend la place du sortant dans le XI (le terrain garde toujours 11 points)
  // pos = poste reel du joueur (pour son delta) / playedPos = poste qu'il occupe sur le terrain (slot du sortant)
  lineup[idx] = {
    num: out.num,
    name: incoming.name,
    first: "",
    pos: incoming.pos,
    playedPos: out.pos,
    x: out.x,
    y: out.y,
    yellow: 0,
    red: false,
    statDelta: incoming.delta,
    subbedIn: true,
    offPosition,
    replaced: out.name,
  };
  // on garde une trace du changement pour l'historique affiche sous le terrain
  const histKey = side==='home' ? 'homeSubHistory' : 'awaySubHistory';
  if(!matchState[histKey]) matchState[histKey] = [];
  matchState[histKey].push({ out: out.name, in: incoming.name, pos: incoming.pos, offPosition });

  playWhistle('card');
  flashMsg(offPosition ? `🔄 ${incoming.name} dépanne hors de son poste` : `🔄 ${incoming.name} remplace ${out.name}`);
  closeCardPopover();
  renderStadium();
}

function closeCardPopover(){
  document.getElementById('cardPopoverLayer').innerHTML = '';
}
function clearCards(side, idx){
  const lineup = side==='home' ? matchState.homeLineup : matchState.awayLineup;
  lineup[idx].yellow = 0;
  lineup[idx].red = false;
  renderStadium();
}

function confirmExitStadium(){
  if(matchState.finished){ closeStadium(); return; }
  if(confirm('Quitter le match en cours ? Le score actuel ne sera pas enregistré.')){
    closeStadium();
  }
}

function resolveGroupResult(hg, ag){
  const m = state.playerMatches[state.currentMatchIndex];
  updateGroupStanding(state.playerGroup.letter, m.home, m.away, hg, ag);
  state.allGroupResults[state.playerGroup.letter].push({home:m.home,away:m.away,hg,ag,matchday:state.currentMatchIndex+1});
  m.played=true; m.hg=hg; m.ag=ag;

  const isHome = m.home.name===state.playerTeam.name;
  const playerGoals = isHome?hg:ag;
  const oppGoals = isHome?ag:hg;
  const won = playerGoals>oppGoals, drew = playerGoals===oppGoals;
  const standing = sortStanding(state.groupStandings[state.playerGroup.letter]);
  const playerPos = standing.findIndex(s=>s.team.name===state.playerTeam.name)+1;

  let html = bannerHTML(won, drew);
  html += `<div class="card"><div class="scoreline">
    <div class="sc">${hg} — ${ag}</div>
    <div class="tn">${m.home.flag} ${m.home.name} vs ${m.away.flag} ${m.away.name}</div>
  </div></div>`;
  html += `<div class="card"><h3>Classement groupe ${state.playerGroup.letter}</h3>
    <table class="gtable"><thead><tr><th>Équipe</th><th style="text-align:center">J</th><th style="text-align:center">Pts</th><th style="text-align:center">Diff</th></tr></thead>
    <tbody>${standing.map((s,i)=>`<tr class="${i<2?'qualified':''} ${s.team.name===state.playerTeam.name?'you':''}"><td>${s.team.flag} ${s.team.name}</td><td style="text-align:center">${s.played}</td><td style="text-align:center;font-weight:700">${s.pts}</td><td style="text-align:center;color:${s.gd>=0?'#2fd180':'#ff5c5c'}">${s.gd>=0?'+':''}${s.gd}</td></tr>`).join('')}</tbody></table>
    <div class="center-note">Tu es ${playerPos}${playerPos===1?'er':'ème'} sur 4</div>
  </div>`;

  state.currentMatchIndex++;
  if(state.currentMatchIndex<state.playerMatches.length){
    simulateOtherGroupMatches(state.currentMatchIndex+1);
  }
  const nextLabel = state.currentMatchIndex<state.playerMatches.length
    ? `Match suivant (Journée ${state.currentMatchIndex+1})`
    : 'Voir le bilan des poules';

  html += `<button class="btn btn-gold" onclick="afterGroupResult()">${nextLabel} <i class="ti ti-arrow-right"></i></button>`;
  goTo('s-result');
  document.getElementById('resultContent').innerHTML = html;
}

function bannerHTML(won, drew){

  if(drew) return `<div class="result-banner draw"><div class="ic">🤝</div><div class="lbl display" style="color:var(--text-hi)">MATCH NUL</div></div>`;
  return `<div class="result-banner lose"><div class="ic">😓</div><div class="lbl display">DÉFAITE</div></div>`;

function showKnockoutPrematch(){
  const m = state.knockoutBracket.find(m=>
    (m.home.name===state.playerTeam.name||m.away.name===state.playerTeam.name) && !m.played
  );
  if(!m) return;
  state.currentPrematch = m;
  state.currentPrematchKnockout = true;
  goTo('s-prematch');
}

function resolveKnockoutResult(hg, ag){
  const m = state.currentPrematch;
  let finalHg=hg, finalAg=ag, wentToPens=false;
  if(hg===ag){
    wentToPens = true;
    const r = simulateMatch(m.home, m.away);
    let ph = Math.floor(Math.random()*3)+3, pa = Math.floor(Math.random()*3)+3;
    while(ph===pa){ ph = Math.floor(Math.random()*4)+2; pa = Math.floor(Math.random()*4)+2; }
    finalHg = hg; finalAg = ag;
    m.pensHome = ph; m.pensAway = pa;
  }
  m.played = true; m.hg = hg; m.ag = ag;
  const winner = wentToPens ? (m.pensHome>m.pensAway?m.home:m.away) : (hg>ag?m.home:m.away);
  m.winner = winner;
  const isPlayerWinner = winner.name===state.playerTeam.name;

  let html = '';
  if(wentToPens){
    html += `<div class="card" style="text-align:center;background:rgba(242,193,78,0.08);border-color:rgba(242,193,78,0.25)">
      <div style="font-size:12px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:0.5px"><i class="ti ti-bolt"></i> Tirs au but</div>
      <div class="sc display" style="font-size:28px;margin-top:6px">${m.pensHome} — ${m.pensAway}</div>
    </div>`;
  }
  html += isPlayerWinner
    ? `<div class="result-banner win"><div class="ic">🎉</div><div class="lbl display">QUALIFIÉ !</div></div>`
    : `<div class="result-banner lose"><div class="ic">💔</div><div class="lbl display">ÉLIMINÉ</div><p style="color:var(--text-mid);margin-top:6px;font-size:13px">${winner.flag} ${winner.name} passe au tour suivant</p></div>`;

  html += `<div class="card"><div class="scoreline">
    <div class="sc display">${hg} — ${ag}</div>
    <div class="tn">${m.home.flag} ${m.home.name} vs ${m.away.flag} ${m.away.name}</div>
  </div></div>`;

  if(!isPlayerWinner){
    html += `<button class="btn btn-gold" onclick="restartGame()"><i class="ti ti-refresh"></i> Nouvelle partie</button>`;
    goTo('s-result');
    document.getElementById('resultContent').innerHTML = html;
    return;
  }

  simulateOtherKnockoutMatches();

  if(state.knockoutRound==='F'){
    html += `<button class="btn btn-gold" onclick="goTo('s-champion')"><i class="ti ti-trophy"></i> Voir la suite</button>`;
  } else {
    advanceKnockoutRound();
    html += `<button class="btn btn-gold" onclick="goTo('s-knockout')">Continuer en phase finale <i class="ti ti-arrow-right"></i></button>`;
  }
  goTo('s-result');
  document.getElementById('resultContent').innerHTML = html;
}

function renderChampion(){
  if(!state.playerTeam) return `<div class="screen" id="s-champion"></div>`;
  return `
  <div class="screen" id="s-champion">
    <div class="content" style="padding-top:40px">
      <div class="result-banner win" style="padding:46px 20px">
        <div class="ic" style="font-size:60px">${state.playerTeam.flag}</div>
        <div class="lbl display" style="font-size:32px;margin-top:10px">🏆 CHAMPION DU MONDE 🏆</div>
        <p style="color:var(--text-mid);margin-top:8px">La ${state.playerTeam.name} remporte la Coupe du Monde 2026 !</p>
      </div>
      <button class="btn btn-gold" onclick="restartGame()"><i class="ti ti-refresh"></i> Nouvelle partie</button>
    </div>
  </div>`;
}

function restartGame(){
  state = {
    playerTeam:null, matchDuration:6, maxGoals:6, groups:[], playerGroup:null,
    currentMatchIndex:0, playerMatches:[], groupStandings:{}, allGroupResults:{},
    phase:'home', knockoutRound:null, knockoutBracket:[], currentKnockoutMatch:null,
  };
  goTo('s-home');
}

function attachHomeHandlers(){}

// init
render('s-home');

</script>
</body>
</html>
